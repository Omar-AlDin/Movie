<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="style.css" />
    <title>Movie Game</title>
    <!-- Open Graph / Link Preview Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Guess The Movie! 🎬" />
    <meta property="og:description" content="Test your film knowledge in this retro arcade guessing game!" />
    <meta property="og:url" content="https://omar-aldin.github.io/Movie/" />

    <!-- ⚠️ Crucial: This MUST be a full, absolute URL to your image file -->
    <meta property="og:image" content="https://omar-aldin.github.io/Movie/scott.jpg" />
</head>

<body>
    <header>
        <h1 class="guessthemovie">Guess The Movie!</h1>

        <button class="btn new">🎟 New Game</button>
    </header>
    <main>
        <section class="left">
            <p class="message">Start guessing...</p>

            <img src="movie-1.jpg" alt="you're next poster" class="image" />
            <div class="input-row">
                <input type="text" class="guess" placeholder="Movie name..." /> <button class="btn check">🎬
                    Check!</button>

            </div>
            <button class="btn skip">🎭 Skip</button>

        </section>
        <section class="right">
            <p class="label-score">💯 Score: <span class="score">20</span></p>
            <p class="label-highscore">
                🥇 Highscore: <span class="highscore">0</span>
            </p>
        </section>

    </main>
    <script src="movie.js"></script>
</body>

</html>
